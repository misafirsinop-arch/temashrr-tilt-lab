<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Tilt</title>
</head>

<body style="font-size:40px;text-align:center;">
<h2>ESP32 Eğim Canlı</h2>

<div id="x">Pitch: ...</div>
<div id="y">Roll: ...</div>

<script>

const url = "https://esp32-ed902-default-rtdb.firebaseio.com/egim.json";

async function getData() {
  const res = await fetch(url + "?t=" + Date.now());
  const data = await res.json();

  document.getElementById("x").innerHTML = "Pitch: " + data.pitch + "°";
  document.getElementById("y").innerHTML = "Roll: " + data.roll + "°";
}

// 🔥 daha hızlı güncelle
setInterval(getData, 300);

</script>

</body>
</html>
